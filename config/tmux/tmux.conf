# --- Core ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,ghostty:Tc"
set -sg escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g mouse on

# 1-indexed windows/panes, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# --- Splits (intuitive keys, keep cwd) ---
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Vim-style pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resize (repeatable: -r means you can hold prefix once and tap H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Layout toggle: flip between even-horizontal (row) and even-vertical (column) ---
# Detect orientation via pane width: stacked panes span full window width.
bind e if -F "#{==:#{pane_width},#{window_width}}" \
  "select-layout even-horizontal" \
  "select-layout even-vertical"

# --- Copy mode: vi keys ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# --- Status bar (minimal) ---
set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=green,bold] #S "
set -g status-right "#[fg=cyan]%a %H:%M #[fg=yellow] %d-%b "
set -g status-left-length 40
setw -g window-status-current-style "fg=black,bg=cyan,bold"
